<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuponera Sociedad Valiente</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#ccff34;
display:flex;
justify-content:center;
padding:40px 15px;
}

.container{

max-width:1100px;
width:100%;

background:#ccff34;

padding:40px;

border-radius:30px;

text-align:center;

box-shadow:0 40px 120px rgba(0,0,0,0.25);

}

.logo{

width:360px;
max-width:100%;

margin-bottom:20px;

}

.titulo{

font-family:'Montserrat',sans-serif;

font-size:22px;

font-weight:800;

margin-bottom:35px;

letter-spacing:1px;

}

.cuponera{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}

.cupon{
border-radius:18px;

overflow:hidden;

box-shadow:0 8px 25px rgba(0,0,0,0.15);

transition:0.25s;

aspect-ratio:3/1.35;

display:flex;

align-items:center;

justify-content:center;

padding:8px;

}

.cupon:hover{

transform:scale(1.05);

}

.cupon img{

width:100%;

height:100%;

object-fit:contain;

}

footer{

margin-top:40px;

font-family:'Montserrat',sans-serif;

font-weight:700;

font-size:14px;

}

@media (max-width:600px){

.container{

padding:25px;

}

.logo{

width:240px;

}

}

</style>

</head>

<body>

<div class="container">

<img src="images/Logotipo_Negro-01.png" class="logo">

<div class="titulo">
CUPONERA SOCIEDAD VALIENTE
</div>
